version: 2.1
orbs:
  ruby: circleci/ruby@0.1.2
  browser-tools: circleci/browser-tools@2.4.0
jobs:
  build:
    docker:
      - image: cimg/ruby:2.6.9-browsers
      - image: redis
    resource_class: large
    executor: ruby/default
    steps:
      - browser-tools/install_chrome:
          timeout: 5m
      - browser-tools/install_chromedriver:
          timeout: 5m
      - checkout
      - run:
          name: Which bundler?
          command: |
            gem install bundler:1.17.3
            bundle -v
            echo -n "node "
            node -v
            ruby -v
            
      - ruby/bundle-install
      - run:
          name: E2E
          command: bundle exec rake integration
      - run:
          name: UT
          command: bundle exec rspec
      - store_artifacts:
          path: ./tmp/makerspace-react/tmp/screenshots
  publish:
    docker:
      - image: cimg/ruby:2.6.9-browsers
    resource_class: large
    executor: ruby/default
    steps:
      - browser-tools/install_chrome:
          timeout: 5m
      - browser-tools/install_chromedriver:
          timeout: 5m
      - checkout
      - run:
          name: Which bundler?
          command: bundle -v
      - ruby/bundle-install
      - run:
          name: Publish
          command: |
            git config --global -l
            git config --global user.email circleci@circleci
            git config --global user.name CircleCI
            bundle exec rake publish

workflows:
  workflow:
    jobs:
      - build
      - publish:
          filters:
            branches:
              only: master

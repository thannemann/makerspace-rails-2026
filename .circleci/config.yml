version: 2.1

orbs:
  browser-tools: circleci/browser-tools@1.4.8

jobs:
  build:
    docker:
      - image: cimg/ruby:2.6.9-browsers
      - image: mongo:4.4
        environment:
          MONGO_INITDB_DATABASE: makerspace_test
      - image: redis

    resource_class: large

    steps:
      - checkout

      - run:
          name: Check environment
          command: |
            ruby -v
            which ruby
            cat Gemfile | grep ^ruby || echo "no ruby version in Gemfile"

      - browser-tools/install-chrome:
          chrome-version: "114.0.5735.90"
      - browser-tools/install-chromedriver:
          chromedriver-version: "114.0.5735.90"

      - run:
          name: Install Bundler 1.17.3
          command: |
            gem install bundler:1.17.3
            bundle -v
            node -v
            ruby -v

      - restore_cache:
          keys:
            - bundle-v1-{{ checksum "Gemfile.lock" }}
            - bundle-v1-

      - run:
          name: Bundle install
          command: bundle install --path vendor/bundle --jobs 4 --retry 3

      - save_cache:
          key: bundle-v1-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle

      - run:
          name: Wait for MongoDB
          command: |
            for i in $(seq 1 30); do
              mongo --eval "db.runCommand({ ping: 1 })" --quiet && break
              echo "Waiting for mongo... ($i)"
              sleep 2
            done

      - run:
          name: Create mongoid_search indexes
          command: |
            bundle exec rails runner "
              Mongoid.purge!
              Member.create_indexes
              Payment.create_indexes
              puts 'Indexes created'
            "

      - run:
          name: E2E
          command: bundle exec rake integration

      - run:
          name: UT
          command: bundle exec rspec

      - store_artifacts:
          path: ./tmp/makerspace-react/tmp/screenshots

  publish:
    docker:
      - image: cimg/ruby:2.6.9-browsers
    resource_class: large
    steps:
      - checkout

      - run:
          name: Install Bundler 1.17.3
          command: |
            gem install bundler:1.17.3
            bundle -v

      - restore_cache:
          keys:
            - bundle-v1-{{ checksum "Gemfile.lock" }}
            - bundle-v1-

      - run:
          name: Bundle install
          command: bundle install --path vendor/bundle --jobs 4 --retry 3

      - save_cache:
          key: bundle-v1-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle

      - run:
          name: Publish
          command: |
            git config --global user.email circleci@circleci
            git config --global user.name CircleCI
            bundle exec rake publish

workflows:
  workflow:
    jobs:
      - build
      - publish:
          filters:
            branches:
              only: master
          requires:
            - build

version: 2.1
orbs:
  ruby: circleci/ruby@2.6.0

jobs:
  build:
    docker:
      - image: circleci/ruby:2.7.5-node-browsers-legacy
      - image: redis
    executor: ruby/default
    steps:
      - checkout
      - run:
          name: Get Ruby Version
          command:  ruby -v
      - run:
          name: Install bundler gem
          command: gem install bundler:1.17.3 
      - run:
          name: Which bundler?
          command: bundle -v
      #- ruby/bundle-install
      - run:
          name: Install Gems
          command: bundle install --path vendor/bundle
      - run:
          name: UT
          command: bundle exec rspec
      - run:
          name: E2E
          command: bundle exec rake integration
      - store_artifacts:
          path: ./tmp/makerspace-react/tmp/screenshots
  publish:
    docker:
      - image: circleci/ruby:2.7.5-node-browsers-legacy
    executor: ruby/default
    steps:
      - checkout
      - run:
          name: Which bundler?
          command: bundle -v
      #- ruby/bundle-install:
      - run:
          name: Publish
          command: |
            git config --global -l
            git config --global user.email circleci@circleci
            git config --global user.name CircleCI
            bundle exec rake publish

workflows:
  workflow:
    jobs:
      - build
      - publish:
          filters:
            branches:
              only: master

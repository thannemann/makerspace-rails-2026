version: 2.1

orbs:
  ruby: circleci/ruby@2.1.4   # updated from 0.1.2 — old orb missing bundle-install command

jobs:
  build:
    docker:
      - image: cimg/ruby:2.6.9-node   # node included; drop -browsers (no E2E here)
      - image: mongo:4.4              # ADD: Mongoid needs MongoDB — was missing entirely
        environment:
          MONGO_INITDB_DATABASE: makerspace_test
      - image: redis:6                # keep Redis

    resource_class: medium            # large is unnecessary for unit tests only

    environment:
      RAILS_ENV: test
      # MongoDB — matches the key in config/mongoid.yml
      MLAB_URI: mongodb://localhost:27017/makerspace_test
      # Redis
      REDIS_URL: redis://localhost:6379/0
      # Rails internals
      SECRET_KEY_BASE: ci_dummy_secret
      DEVISE_SECRET_KEY: ci_dummy_devise
      # Third-party APIs — dummy values so initializers boot without crashing
      PAYPAL_CLIENT_ID:        dummy
      PAYPAL_SECRET:           dummy
      BT_ENV:                  sandbox
      BT_MERCHANT_ID:          dummy
      BT_PUBLIC_KEY:           dummy
      BT_PRIVATE_KEY:          dummy
      SLACK_ADMIN_TOKEN:       dummy
      GMAIL_USERNAME:          dummy@example.com
      GMAIL_PASSWORD:          dummy
      GOOGLE_ID:               dummy
      GOOGLE_SECRET:           dummy
      GOOGLE_TOKEN:            dummy
      CODE_CONDUCT_ID:         dummy
      CODE_CONDUCT_FOLDER:     dummy
      CONTRACT_ID:             dummy
      MEMBER_CONTRACT_FOLDER:  dummy
      RENTAL_AGREEMENT_ID:     dummy
      RENTAL_AGREEMENT_FOLDER: dummy
      RESOURCES_FOLDER:        dummy
      SIGNATURES_FOLDER:       dummy
      BACKUP_FOLDER:           dummy
      HONEYBADGER_API_KEY:     dummy
      HONEYBADGER_ENV:         test

    steps:
      - checkout

      # ── FIX 1: Build the React UI so Sprockets can find makerspace-react.js ──
      # app/assets/config/manifest.js links makerspace-react.js. Any spec that
      # triggers a controller action which uses url_for(:application) (e.g. POST
      # /admin/members → send_set_password_email) causes Sprockets to compile
      # the full manifest. Without the built file those specs crash with
      # Sprockets::FileNotFound before any assertion runs.
      - run:
          name: Build UI (React → app/assets/builds/)
          working_directory: ui
          command: |
            yarn install --frozen-lockfile --ignore-engines
            yarn build

      - run:
          name: Install Bundler 1.17.3
          command: gem install bundler:1.17.3

      # ruby orb 2.x uses bundle-install (hyphen, not underscore)
      - ruby/bundle-install

      - run:
          name: Wait for MongoDB
          command: |
            for i in $(seq 1 30); do
              mongo --eval "db.runCommand({ ping: 1 })" --quiet && break
              echo "Waiting for mongo... ($i)"
              sleep 2
            done

      # ── FIX 2: Ensure mongoid_search indexes exist before specs run ──────────
      # Payment#find_member runs in after_initialize (fires immediately at
      # .create time). It calls Member.search() which queries _keywords /
      # _firstname_keywords fields built by mongoid_search. The specs use
      # sleep(5) to allow the index to become consistent, but that only works
      # if the index already exists on the collection. Creating it explicitly
      # here guarantees it is present before any spec touches the DB.
      - run:
          name: Create mongoid_search indexes
          command: |
            bundle exec rails runner "
              Mongoid.purge!
              Member.create_indexes
              Payment.create_indexes
              puts 'Indexes created'
            "

      - run:
          name: Run RSpec
          command: bundle exec rspec --format progress

      - store_artifacts:
          path: ./tmp/screenshots

  publish:
    docker:
      - image: cimg/ruby:2.6.9-node
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install Bundler 1.17.3
          command: gem install bundler:1.17.3
      - ruby/bundle-install
      - run:
          name: Publish
          command: |
            git config --global user.email circleci@circleci
            git config --global user.name CircleCI
            bundle exec rake publish

workflows:
  workflow:
    jobs:
      - build
      - publish:
          filters:
            branches:
              only: master
          requires:
            - build

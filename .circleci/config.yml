version: 2.1
orbs:
  ruby: circleci/ruby@0.1.2
  browser-tools: circleci/browser-tools@2.4.0
jobs:
  build:
    docker:
      - image: cimg/ruby:2.6.9-browsers
      - image: redis
    resource_class: large
    steps:
      - checkout
      - run:
          name: Check environment
          command: |
            ruby -v
            which ruby
            cat .ruby-version 2>/dev/null || echo "no .ruby-version file"
            cat Gemfile | grep ^ruby || echo "no ruby version in Gemfile"
      - browser-tools/install_chrome:
          timeout: 5m
      - browser-tools/install_chromedriver:
          timeout: 5m
      - run:
          name: Which bundler?
          command: |
            gem install bundler:1.17.3
            bundle -v
            echo -n "node "
            node -v
            ruby -v
      - run:
          name: Install matching ChromeDriver
          command: |
            CHROME_VERSION=$(google-chrome --version | grep -oP '\d+' | head -1)
            npx chromedriver --version || npm install -g chromedriver@$CHROME_VERSION
      - ruby/bundle-install
      - run:
          name: E2E
          command: bundle exec rake integration
      - run:
          name: UT
          command: bundle exec rspec
      - store_artifacts:
          path: ./tmp/makerspace-react/tmp/screenshots
  publish:
    docker:
      - image: cimg/ruby:2.6.9-browsers
    resource_class: large
    steps:
      - checkout
      - browser-tools/install_chrome:
          timeout: 5m
      - browser-tools/install_chromedriver:
          timeout: 5m
      - run:
          name: Which bundler?
          command: |
            gem install bundler:1.17.3
            bundle -v
      - ruby/bundle-install
      - run:
          name: Publish
          command: |
            git config --global -l
            git config --global user.email circleci@circleci
            git config --global user.name CircleCI
            bundle exec rake publish
workflows:
  workflow:
    jobs:
      - build
      - publish:
          filters:
            branches:
              only: master
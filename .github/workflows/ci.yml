name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
jobs:
  # ── 1. Build the React/TS UI ────────────────────────────────────────────────
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
          
      - name: Checkout react repo into ui subfolder
        uses: actions/checkout@v4
        with:
            repository: thannemann/makerspace-react
            ref: master
            path: ui
            
      - name: Set up Node 16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "yarn"
          cache-dependency-path: ui/yarn.lock

      - name: Install UI dependencies
        working-directory: ui
        run: yarn install --ignore-engines

      - name: Build UI
        working-directory: ui
        run: yarn build

      - name: Upload compiled assets
        uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: app/assets/builds/
          retention-days: 1

  # ── 2. React unit tests (Jest) ──────────────────────────────────────────────
  jest:
    name: Jest (UI unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
          
      - name: Checkout react repo into ui subfolder
        uses: actions/checkout@v4
        with:
            repository: thannemann/makerspace-react
            ref: master
            path: ui
            
      - name: Set up Node 16
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "yarn"
          cache-dependency-path: ui/yarn.lock

      - name: Install UI dependencies
        working-directory: ui
        run: yarn install --ignore-engines

      - name: Run Jest
        working-directory: ui
        run: yarn test --ci --reporters=default

  # ── 3. RSpec (Rails unit tests) ─────────────────────────────────────────────
  rspec:
    name: RSpec
    runs-on: ubuntu-latest
    needs: build-ui

    services:
      mongo:
        image: mongo:4.4      # matches mongoid ~> 7.0.5 / mongo driver 2.13.x
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      MLAB_URI: mongodb://localhost:27017/makerspace_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY_BASE:         ci_dummy_secret_key_base
      DEVISE_SECRET_KEY:       ci_dummy_devise_secret
      PAYPAL_CLIENT_ID:        dummy
      PAYPAL_SECRET:           dummy
      BT_ENV:                  sandbox
      BT_MERCHANT_ID:          dummy
      BT_PUBLIC_KEY:           dummy
      BT_PRIVATE_KEY:          dummy
      SLACK_ADMIN_TOKEN:       dummy
      GMAIL_USERNAME:          dummy@example.com
      GMAIL_PASSWORD:          dummy
      GOOGLE_ID:               dummy
      GOOGLE_SECRET:           dummy
      GOOGLE_TOKEN:            dummy
      CODE_CONDUCT_ID:         dummy
      CODE_CONDUCT_FOLDER:     dummy
      CONTRACT_ID:             dummy
      MEMBER_CONTRACT_FOLDER:  dummy
      RENTAL_AGREEMENT_ID:     dummy
      RENTAL_AGREEMENT_FOLDER: dummy
      RESOURCES_FOLDER:        dummy
      SIGNATURES_FOLDER:       dummy
      BACKUP_FOLDER:           dummy
      HONEYBADGER_API_KEY:     dummy
      HONEYBADGER_ENV:         test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 2.6.9
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.6.9"
          bundler-version: "1.17.3"
          bundler-cache: true

      - name: Download built UI assets
        uses: actions/download-artifact@v4
        with:
          name: ui-build
          path: app/assets/builds/

      - name: Run RSpec
        run: bundle exec rspec --format documentation

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rspec-failure-artifacts
          path: |
            tmp/
            log/test.log
          retention-days: 7

  # ── 4. Production asset compile check ──────────────────────────────────────
  compile-production:
    name: Production Asset Compile
    runs-on: ubuntu-latest
    needs: build-ui

    env:
      RAILS_ENV:               production
      SECRET_KEY_BASE:         ci_dummy_secret_key_base
      DEVISE_SECRET_KEY:       ci_dummy_devise_secret
      MLAB_URI:                mongodb://localhost:27017/makerspace_production
      PAYPAL_CLIENT_ID:        dummy
      PAYPAL_SECRET:           dummy
      BT_ENV:                  sandbox
      BT_MERCHANT_ID:          dummy
      BT_PUBLIC_KEY:           dummy
      BT_PRIVATE_KEY:          dummy
      SLACK_ADMIN_TOKEN:       dummy
      GMAIL_USERNAME:          dummy@example.com
      GMAIL_PASSWORD:          dummy
      GOOGLE_ID:               dummy
      GOOGLE_SECRET:           dummy
      GOOGLE_TOKEN:            dummy
      HONEYBADGER_API_KEY:     dummy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 2.6.9
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.6.9"
          bundler-version: "1.17.3"
          bundler-cache: true

      - name: Download built UI assets
        uses: actions/download-artifact@v4
        with:
          name: ui-build
          path: app/assets/builds/

      - name: Precompile assets
        run: bundle exec rails assets:precompile
